<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gallery App</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    nav {
      background-color: #007BFF;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    main {
      width: 90%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background-color: white;
      border-radius: 5px;
      padding: 10px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    section {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background-color: #0056b3; }

    /* Gallery grid layout */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .item-card {
      background-color: white;
      border-radius: 5px;
      padding: 15px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .item-card h3 {
      margin: 0 0 8px 0;
      color: #007BFF;
      font-size: 16px;
    }

    .item-card p {
      margin: 4px 0;
      font-size: 14px;
      color: #333;
    }

    .item-card .badge {
      font-size: 12px;
      background-color: #e0f0ff;
      color: #007BFF;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <nav>Gallery App</nav>

  <main>

    <section class="card">
      <button onclick="sortByName()">Sort by Name</button>
      <button onclick="sortByDate()">Sort by Date</button>
      <button onclick="resetData()">Reset</button>
    </section>

    <!-- Render target — JS fills this with cards -->
    <div id="gallery">
      <p>Loading...</p>
    </div>

  </main>

  <script>

    let state = [];

    /* STEP 1 — Fetch data from the API */
    async function getData() {
      const response = await fetch('YOUR_API_URL_HERE');
      const data = await response.json();
      state = data;
      drawGallery(state);
    }

    /* STEP 2 — Build and display the cards
       Replace FIELD1, FIELD2, FIELD3 with the
       actual field names from your API data     */
    function drawGallery(records) {
      let gallery = document.getElementById('gallery');
      let html = '';

      for (let rec of records) {
        html += `
          <div class="item-card">
            <h3>${rec.FIELD1}</h3>
            <p><strong>Label 1:</strong> ${rec.FIELD2}</p>
            <p><strong>Label 2:</strong> ${rec.FIELD3}</p>
            <span class="badge">${rec.FIELD4}</span>
          </div>
        `;
      }

      gallery.innerHTML = html;
    }

    /* STEP 3 — Sort by name alphabetically
       Replace FIELD1 with the name field of your API */
    function sortByName() {
      let sorted = [...state].sort(function(a, b) {
        return a.FIELD1.localeCompare(b.FIELD1);
      });
      drawGallery(sorted);
    }

    /* STEP 4 — Sort by date
       Replace FIELD2 with the date field of your API */
    function sortByDate() {
      let sorted = [...state].sort(function(a, b) {
        return new Date(a.FIELD2) - new Date(b.FIELD2);
      });
      drawGallery(sorted);
    }

    /* STEP 5 — Reset back to original order */
    function resetData() {
      drawGallery(state);
    }

    getData();

  </script>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Table App</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    nav {
      background-color: #007BFF;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    main {
      width: 90%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background-color: white;
      border-radius: 5px;
      padding: 10px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    section {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background-color: #0056b3; }

    /* Table layout */
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: left;
      font-size: 14px;
    }

    thead th {
      background-color: #007BFF;
      color: white;
      font-weight: bold;
    }

    tr:nth-child(even) { background-color: #f2f2f2; }

    tr:hover { background-color: #ddd; }
  </style>
</head>
<body>

  <nav>Table App</nav>

  <main>

    <section class="card">
      <button onclick="sortByName()">Sort by Name</button>
      <button onclick="sortByDate()">Sort by Date</button>
      <button onclick="resetData()">Reset</button>
    </section>

    <!-- Table structure — tbody is the render target -->
    <table class="card">
      <thead>
        <tr>
          <!-- Replace these with your actual column names -->
          <th>Column 1</th>
          <th>Column 2</th>
          <th>Column 3</th>
          <th>Column 4</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- JS fills this with rows -->
      </tbody>
    </table>

  </main>

  <script>

    let state = [];

    /* STEP 1 — Fetch data from the API */
    async function getData() {
      const response = await fetch('YOUR_API_URL_HERE');
      const data = await response.json();
      state = data;
      drawTable(state);
    }

    /* STEP 2 — Build and display the rows
       Replace FIELD1, FIELD2, FIELD3, FIELD4 with
       the actual field names from your API data    */
    function drawTable(records) {
      let tbody = document.getElementById('table-body');
      let html = '';

      for (let rec of records) {
        html += `
          <tr>
            <td>${rec.FIELD1}</td>
            <td>${rec.FIELD2}</td>
            <td>${rec.FIELD3}</td>
            <td>${rec.FIELD4}</td>
          </tr>
        `;
      }

      tbody.innerHTML = html;
    }

    /* STEP 3 — Sort by name alphabetically
       Replace FIELD1 with the name field of your API */
    function sortByName() {
      let sorted = [...state].sort(function(a, b) {
        return a.FIELD1.localeCompare(b.FIELD1);
      });
      drawTable(sorted);
    }

    /* STEP 4 — Sort by date
       Replace FIELD2 with the date field of your API */
    function sortByDate() {
      let sorted = [...state].sort(function(a, b) {
        return new Date(a.FIELD2) - new Date(b.FIELD2);
      });
      drawTable(sorted);
    }

    /* STEP 5 — Reset back to original order */
    function resetData() {
      drawTable(state);
    }

    getData();

  </script>

</body>
</html>
