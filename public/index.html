<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Barbados Holidays</title>

  <!-- ==================== CSS STYLING ==================== -->
  <style>
    * {
      box-sizing: border-box;
    }

    /* Makes the page a vertical column with spacing between sections */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Top navigation bar */
    nav {
      background-color: #00e1ff;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    /* Centers the main content and stacks children vertically */
    main {
      width: 90%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* White box style used for the controls section */
    .card {
      background-color: white;
      border-radius: 5px;
      padding: 10px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    /* Lays the sort buttons out in a row */
    section {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Style for all buttons */
    button {
      padding: 8px 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #0056b3;
    }

    /* Grid layout for the holiday cards */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    /* Individual holiday card styling */
    .holiday-card {
      background-color: white;
      border-radius: 5px;
      padding: 15px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .holiday-card h3 {
      margin: 0 0 8px 0;
      color: #007BFF;
      font-size: 16px;
    }

    .holiday-card p {
      margin: 4px 0;
      font-size: 14px;
      color: #333;
    }

    /* Small blue badge at the bottom of each card */
    .holiday-card .type {
      font-size: 12px;
      background-color: #e0f0ff;
      color: #007BFF;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 6px;
    }
  </style>
  <!-- ==================== END CSS ==================== -->

</head>
<body>

  <!-- ==================== NAVBAR ==================== -->
  <nav>🇧🇧 Barbados Holidays 2024</nav>
  <!-- ==================== END NAVBAR ==================== -->

  <main>

    <!-- ==================== CONTROLS SECTION ==================== -->
    <!-- This is the white box with the sort buttons inside -->
    <section class="card">
      <button onclick="sortByName()">Sort by Name</button>
      <button onclick="sortByDate()">Sort by Date</button>
      <button onclick="resetData()">Reset</button>
    </section>
    <!-- ==================== END CONTROLS ==================== -->

    <!-- ==================== GALLERY (RENDER TARGET) ==================== -->
    <!-- This div is empty on purpose — JavaScript fills it with cards -->
    <div id="gallery">
      <p>Loading...</p>
    </div>
    <!-- ==================== END GALLERY ==================== -->

  </main>

  <!-- ==================== JAVASCRIPT ==================== -->
  <script>

    /*
      HOW THIS API IMPLEMENTATION WORKS:
      ====================================
      1. The page loads and immediately calls getData()
      2. getData() sends a request to the API URL using fetch()
      3. The API sends back a JSON array of holiday objects
      4. We store that array in the global variable "state"
      5. We pass state into drawGallery() which builds the HTML cards
      6. The sort buttons create a NEW sorted array from state
         and pass that to drawGallery() — state itself never changes

      Each holiday object from the API looks like this:
      {
        "date": "2024-01-01",
        "name": "New Year's Day",
        "localName": "New Year's Day",
        "countryCode": "BB",
        "types": ["Public"]
      }
      We access each field using dot notation e.g. rec.name, rec.date
    */

    /* --- GLOBAL STATE ---
       Stores all holidays fetched from the API.
       All sort functions read from this without changing it. */
    let state = [];

    /* --- STEP 1: FETCH DATA FROM API ---
       fetch() sends a GET request to the URL.
       await waits for the response before continuing.
       response.json() converts the response into a JS array.
       We store it in state then draw the gallery. */
    async function getData() {
      const response = await fetch('https://weblabs.web.app/api/holidays/barbados.json');
      const data = await response.json();
      state = data;        // save the full array into state
      drawGallery(state);  // display all holidays on the page
    }

    /* --- STEP 2: DRAW THE GALLERY ---
       Takes an array of holiday records and builds HTML cards.
       Each record maps to one .holiday-card div.
       We use template literals (backticks) to inject the data
       from each record into the HTML string using ${} */
    function drawGallery(records) {
      let gallery = document.getElementById('gallery'); // get the render target div
      let html = ''; // start with an empty string

      for (let rec of records) {        // loop through every holiday
        html += `
          <div class="holiday-card">
            <h3>${rec.name}</h3>                          <!-- Holiday name -->
            <p><strong>Date:</strong> ${rec.date}</p>     <!-- Date from API -->
            <p><strong>Local Name:</strong> ${rec.localName}</p>
            <p><strong>Country:</strong> ${rec.countryCode}</p>
            <span class="type">${rec.types[0]}</span>     <!-- First type in the array -->
          </div>
        `;
      }

      gallery.innerHTML = html; // inject all the built HTML into the page
    }

    /* --- STEP 3: SORT BY NAME ---
       Creates a NEW array sorted alphabetically by name.
       localeCompare() compares two strings alphabetically.
       We use [...state] (spread) to copy state so we don't modify the original. */
    function sortByName() {
      let sorted = [...state].sort(function(a, b) {
        return a.name.localeCompare(b.name);
      });
      drawGallery(sorted);
    }

    /* --- STEP 4: SORT BY DATE ---
       Creates a NEW array sorted by date (earliest first).
       new Date() converts the date string into a Date object
       so we can subtract them — earlier dates give a negative number. */
    function sortByDate() {
      let sorted = [...state].sort(function(a, b) {
        return new Date(a.date) - new Date(b.date);
      });
      drawGallery(sorted);
    }

    /* --- STEP 5: RESET ---
       Simply redraws the gallery using the original state array
       which was never modified, so it goes back to the original order. */
    function resetData() {
      drawGallery(state);
    }

    /* --- STEP 6: KICK EVERYTHING OFF ---
       This line runs when the page loads.
       It triggers getData() which fetches the API and draws the gallery. */
    getData();

  </script>
  <!-- ==================== END JAVASCRIPT ==================== -->

</body>
</html>
